name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -ldflags="-s -w" -o ipadecrypt ./cmd/ipadecrypt

      - name: go test
        run: go test ./...

  helper:
    name: helper
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ldid
        run: brew install ldid

      - name: build helper
        run: ./helper/build.sh

      - name: verify no drift vs committed helper.arm64
        run: |
          fresh=$(shasum -a 256 helper/dist/helper.arm64 | awk '{print $1}')
          committed=$(shasum -a 256 internal/device/helper.arm64 | awk '{print $1}')
          echo "fresh:     $fresh"
          echo "committed: $committed"
          if [ "$fresh" != "$committed" ]; then
            echo "::error::helper.arm64 drift detected — rebuild with ./helper/build.sh and commit internal/device/helper.arm64"
            exit 1
          fi
